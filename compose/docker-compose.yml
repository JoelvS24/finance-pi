services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: finance
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ../app
    container_name: finance-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://finance:${POSTGRES_PASSWORD}@postgres:5432/finance
      TZ: Europe/Amsterdam
    env_file:
      - ../secrets/.env
    volumes:
      - ../secrets:/secrets:ro
      - ../secrets/pytr:/root/.pytr
      - ../app/src:/app/src
      - ../data/imports:/data/imports
    command: streamlit run /app/src/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: finance-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - ../data/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - postgres
